<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>观澜北苑 — 3D 空间可视化</title>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital@0;1&family=DM+Mono:wght@400;500&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f14;--surface:#18181f;--border:rgba(255,255,255,.06);--text:#e8e6e1;--text-dim:rgba(255,255,255,.35);--accent:#c8a87c;--accent-dim:rgba(200,168,124,.15);--radius:10px;--font-display:'Outfit',system-ui,sans-serif;--font-body:'Crimson Text',Georgia,serif;--font-mono:'DM Mono','SF Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:var(--bg);font-family:var(--font-display);color:var(--text);-webkit-font-smoothing:antialiased}
canvas{display:block;position:fixed;top:0;left:0}

/* Overlay */
#overlay{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,rgba(15,15,20,.7),rgba(10,10,16,.95));backdrop-filter:blur(20px);transition:opacity .6s,visibility .6s}
#overlay.hidden{opacity:0;visibility:hidden;pointer-events:none}
#overlay .bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);background-size:40px 40px;mask-image:radial-gradient(ellipse at center,black 30%,transparent 70%)}
#overlay .content{position:relative;z-index:1;text-align:center;max-width:480px;padding:0 24px}
#overlay .brand{font-family:var(--font-body);font-style:italic;font-size:15px;color:var(--accent);letter-spacing:.08em;margin-bottom:20px}
#overlay h1{font-size:36px;font-weight:300;letter-spacing:.02em;line-height:1.2;margin-bottom:12px}
#overlay h1 span{font-weight:700;color:var(--accent)}
#overlay .desc{font-size:15px;color:var(--text-dim);line-height:1.6;margin-bottom:36px}
#dropZone{display:block;padding:44px 32px;border:1px dashed rgba(255,255,255,.12);border-radius:16px;cursor:pointer;transition:all .35s}
#dropZone:hover{border-color:var(--accent);border-style:solid;background:var(--accent-dim)}
#dropZone .icon{font-size:36px;margin-bottom:12px;transition:transform .35s}
#dropZone:hover .icon{transform:translateY(-4px)}
#dropZone .label{font-size:15px;font-weight:500;color:var(--text)}
#dropZone .hint{font-size:12px;color:var(--text-dim);font-family:var(--font-mono)}
#dropZone.drag{border-color:var(--accent);border-style:solid;background:var(--accent-dim)}
#overlay .footer{display:flex;gap:24px;justify-content:center;margin-top:28px;font-size:11px;color:var(--text-dim);font-family:var(--font-mono);letter-spacing:.04em}
.mode-btn{padding:7px 18px;border:1px solid rgba(255,255,255,.12);background:transparent;color:var(--text-dim);border-radius:20px;cursor:pointer;font-size:12px;font-family:var(--font-display);font-weight:500;transition:all .25s;margin:0 4px}
.mode-btn:hover{border-color:rgba(255,255,255,.2);color:var(--text)}
.mode-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}

/* Toast */
#toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:200;pointer-events:none;opacity:0;transition:opacity .3s}
#toast.show{opacity:1}
#toast .pulse{width:48px;height:48px;border-radius:50%;background:var(--accent);margin:0 auto 16px;animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(.8);opacity:.6}50%{transform:scale(1.1);opacity:1}}
#toast .msg{text-align:center;font-size:13px;color:var(--text-dim);font-family:var(--font-mono)}

/* Room sidebar */
#sidebar{position:fixed;left:20px;top:50%;transform:translateY(-50%);z-index:50;display:flex;flex-direction:column;gap:6px;opacity:0;transition:opacity .5s}
#sidebar.visible{opacity:1}
#sidebar button{width:120px;padding:10px 14px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);border-radius:8px;cursor:pointer;font-size:12px;font-family:var(--font-display);font-weight:500;text-align:left;transition:all .25s;backdrop-filter:blur(10px);white-space:nowrap}
#sidebar button:hover{color:var(--text);border-color:rgba(255,255,255,.15)}
#sidebar button.active{color:var(--accent);border-color:var(--accent);background:var(--accent-dim)}
#sidebar button .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:8px;vertical-align:middle}
#sidebar button.all{font-weight:600}

/* Top bar */
#topbar{position:fixed;top:20px;left:160px;right:20px;z-index:50;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;opacity:0;transition:opacity .5s}
#topbar.visible{opacity:1}
#topbar>*{pointer-events:auto}
#view-controls{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px;backdrop-filter:blur(20px)}
#view-controls button{width:38px;height:34px;border:none;background:transparent;color:var(--text-dim);border-radius:7px;cursor:pointer;font-size:12px;font-family:var(--font-mono);font-weight:500;transition:all .2s}
#view-controls button:hover{color:var(--text);background:rgba(255,255,255,.04)}
#view-controls button.active{color:var(--accent);background:var(--accent-dim)}
#info-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 18px;backdrop-filter:blur(20px)}
#info-card .project{font-size:14px;font-weight:600;color:var(--text)}
#info-card .meta{display:flex;gap:14px;margin-top:4px;font-size:11px;color:var(--text-dim);font-family:var(--font-mono)}
#info-card .meta b{color:var(--accent);font-weight:500}

/* Bottom bar */
#bottombar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:50;display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px;backdrop-filter:blur(20px);opacity:0;transition:opacity .5s}
#bottombar.visible{opacity:1}
#bottombar button{padding:8px 16px;border:none;background:transparent;color:var(--text-dim);border-radius:7px;cursor:pointer;font-size:12px;font-family:var(--font-display);font-weight:500;transition:all .2s}
#bottombar button:hover{color:var(--text);background:rgba(255,255,255,.04)}
#bottombar button.active{color:var(--accent);background:var(--accent-dim)}
#bottombar .sep{width:1px;background:var(--border);margin:4px 6px}
#help{position:fixed;bottom:24px;right:24px;z-index:50;font-size:10px;color:var(--text-dim);font-family:var(--font-mono);opacity:0;transition:opacity .5s;text-align:right;line-height:1.8}
#help.visible{opacity:1}
#help kbd{display:inline-block;padding:1px 5px;background:var(--surface);border:1px solid var(--border);border-radius:3px;font-family:var(--font-mono);font-size:10px;color:var(--text-mid)}
#fileInput{display:none}
#roomDetail{position:fixed;right:20px;top:50%;transform:translateY(-50%);z-index:50;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;font-size:11px;font-family:var(--font-mono);color:var(--text-dim);line-height:2;opacity:0;transition:opacity .4s;backdrop-filter:blur(10px);min-width:140px}
#roomDetail.visible{opacity:1}
#roomDetail h3{font-family:var(--font-display);font-size:14px;color:var(--text);margin-bottom:6px}
#roomDetail b{color:var(--accent)}
</style>
</head>
<body>

<!-- Upload -->
<div id="overlay"><div class="bg-grid"></div><div class="content">
<div class="brand">Architectural Visualization</div><h1>设计图 <span>&rarr;</span> 三维空间</h1>
<p class="desc">上传室内设计 PDF 图纸，即时生成可交互 3D 模型</p>
<div id="dropZone"><div class="icon">&#128208;</div><div class="label">拖放 PDF 文件到此处</div><div class="hint">或点击选择文件 &middot; 最大 50MB</div></div>
<div style="margin-top:24px"><button id="btnText" class="mode-btn active" onclick="setMode('text')">文本解析</button><button id="btnVision" class="mode-btn" onclick="setMode('vision')">AI 视觉</button></div>
<p id="backendInfo" style="margin-top:12px;font-size:11px;color:var(--text-dim);font-family:var(--font-mono)"></p>
<div class="footer"><span>全屋定制</span><span>尺寸提取</span><span>实时渲染</span></div>
</div></div>

<!-- Toast -->
<div id="toast"><div class="pulse"></div><div class="msg">解析中...</div></div>

<!-- Sidebar -->
<div id="sidebar"></div>

<!-- Room detail -->
<div id="roomDetail"></div>

<!-- Top -->
<div id="topbar">
<div id="view-controls"><button class="active" data-view="persp" onclick="V('persp')">3D</button><button data-view="top" onclick="V('top')">俯</button><button data-view="front" onclick="V('front')">前</button><button data-view="right" onclick="V('right')">右</button></div>
<div id="info-card"><div class="project" id="sp">&mdash;</div><div class="meta"><span>房间 <b id="sr">0</b></span><span>墙体 <b id="sw">0</b></span><span>柜体 <b id="sc">0</b></span></div></div>
</div>

<!-- Bottom -->
<div id="bottombar"><button onclick="W()" id="btn-wire">线框</button><span class="sep"></span><button onclick="selRoom(-1)">全部显示</button><span class="sep"></span><button onclick="U()">重新上传</button></div>
<div id="help"><kbd>1-4</kbd> 视角 <kbd>W</kbd> 线框 <kbd>&larr;&rarr;</kbd> 切换房间<br>鼠标旋转 滚轮缩放 右键平移</div>
<input type="file" id="fileInput" accept=".pdf">

<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as T from "three";
import {OrbitControls} from "three/addons/controls/OrbitControls.js";
// ── Textures ──
function createTex(w,h,fn){const c=document.createElement('canvas');c.width=w;c.height=h;fn(c.getContext('2d'),w,h);const t=new T.CanvasTexture(c);t.wrapS=t.wrapT=T.RepeatWrapping;t.colorSpace=T.SRGBColorSpace;return t}
const texWall=createTex(256,256,(x,w,h)=>{x.fillStyle='#f0ede6';x.fillRect(0,0,w,h);for(let i=0;i<400;i++){const g=240+Math.random()*12;x.fillStyle=`rgb(${g},${g},${g})`;x.fillRect(Math.random()*w,Math.random()*h,1+Math.random()*2,1+Math.random()*2)}});texWall.repeat.set(3,2);
const texFloor=createTex(512,128,(x,w,h)=>{x.fillStyle='#c8b090';x.fillRect(0,0,w,h);for(let i=0;i<w;i+=32+Math.random()*16){x.fillStyle='#b89575';x.fillRect(i,0,2+Math.random(),h);x.fillStyle='#d4c0a5';x.fillRect(i+3,10+Math.random()*h*.4,.5,12+Math.random()*20)}for(let i=0;i<200;i++){const g=160+Math.random()*30;x.fillStyle=`rgb(${g},${Math.floor(g*.7)},${Math.floor(g*.45)})`;x.fillRect(Math.random()*w,Math.random()*h,1,1)}});texFloor.repeat.set(2,4);
const texCabinet=createTex(256,256,(x,w,h)=>{x.fillStyle='#f5f0e8';x.fillRect(0,0,w,h);for(let i=0;i<w;i+=8){x.fillStyle='#ede6d8';x.fillRect(i,0,.5,h)}});texCabinet.repeat.set(2,2);

// ── Materials ──
const flColors=[0xc8a87c,0x7b9cc2,0x8aaa7a,0xc4956a,0x9b8ec4,0x6aaa9a,0xc47a5a,0x7a8ea0];
const M={
  wall:new T.MeshStandardMaterial({map:texWall,color:0xf5f0e8,roughness:.82,metalness:.02}),
  wallAccent:new T.MeshStandardMaterial({color:0xeeeeee,roughness:.6,metalness:.02}),
  floor:(c)=>new T.MeshStandardMaterial({map:texFloor,color:new T.Color(c).multiplyScalar(1.3),roughness:.35,metalness:.04}),
  cabinet:new T.MeshStandardMaterial({map:texCabinet,color:0xffffff,roughness:.23,metalness:.05}),
  cabAccent:new T.MeshStandardMaterial({color:0xe8e0d4,roughness:.3,metalness:.06}),
  handle:new T.MeshStandardMaterial({color:0xd4c8b0,roughness:.12,metalness:.55}),
  counter:new T.MeshStandardMaterial({color:0xe8e0d4,roughness:.15,metalness:.08}),
  skirting:new T.MeshStandardMaterial({color:0xf0ede6,roughness:.68,metalness:.02}),
  glass:new T.MeshStandardMaterial({color:0xaaccee,roughness:.08,metalness:.08,transparent:true,opacity:.3}),
  door:new T.MeshStandardMaterial({color:0xd4c0a0,roughness:.28,metalness:.06}),
  ceiling:new T.MeshStandardMaterial({color:0xf8f6f0,roughness:.9,metalness:0,side:T.BackSide}),
  ceilingEdge:new T.MeshStandardMaterial({color:0xe8e4d8,roughness:.8,metalness:.02}),
};

// ── Scene ──
const S=new T.Scene();S.background=new T.Color(0x0f0f14);S.fog=new T.Fog(0x0f0f14,18,52);
const C=new T.PerspectiveCamera(50,innerWidth/innerHeight,.1,80);
const R=new T.WebGLRenderer({antialias:true});R.setSize(innerWidth,innerHeight);R.setPixelRatio(Math.min(devicePixelRatio,2));R.shadowMap.enabled=true;R.shadowMap.type=T.PCFSoftShadowMap;R.toneMapping=T.ACESFilmicToneMapping;R.toneMappingExposure=1.2;
document.body.appendChild(R.domElement);
const O=new OrbitControls(C,R.domElement);O.enableDamping=true;O.dampingFactor=.08;O.minDistance=.5;O.maxDistance=40;O.maxPolarAngle=Math.PI*.52;O.target.set(0,1.4,0);O.update();

// ── Lighting ──
S.add(new T.AmbientLight(0x445566,1.6));
const sun=new T.DirectionalLight(0xfff8ee,5.5);sun.position.set(12,18,-5);sun.castShadow=true;sun.shadow.mapSize.set(2048,2048);sun.shadow.camera.near=.5;sun.shadow.camera.far=60;sun.shadow.camera.left=-15;sun.shadow.camera.right=15;sun.shadow.camera.top=15;sun.shadow.camera.bottom=-8;sun.shadow.bias=-.0002;sun.shadow.normalBias=.02;S.add(sun);
S.add(new T.DirectionalLight(0xaabbdd,2)).position.set(-5,5,6);
S.add(new T.DirectionalLight(0xffffff,1.2)).position.set(0,3,-8);

// ── Ground ──
const gnd=new T.Mesh(new T.PlaneGeometry(50,50),new T.MeshStandardMaterial({color:0x181820,roughness:.95}));gnd.rotation.x=-Math.PI/2;gnd.position.y=-.01;gnd.receiveShadow=true;S.add(gnd);
const grid=new T.GridHelper(50,100,0x333355,0x22223a);grid.position.y=.002;grid.material.transparent=true;grid.material.opacity=.35;grid.material.depthWrite=false;S.add(grid);

// ── Model ──
const MG=new T.Group();S.add(MG);
let roomGroups=[],activeRoom=-1,ci=0;

// ── Builders ──
function makeLabel(text,x,y,z,color){
  const cvs=document.createElement('canvas');cvs.width=256;cvs.height=64;
  const ctx=cvs.getContext('2d');ctx.fillStyle='rgba(255,255,255,.9)';ctx.font='600 26px Outfit,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(text,128,32);
  const sp=new T.Sprite(new T.SpriteMaterial({map:new T.CanvasTexture(cvs),transparent:true,depthTest:false,depthWrite:false}));
  sp.position.set(x,y,z);sp.scale.set(2.4,.6,1);return sp;
}

function buildWall(w,tm){
  const L=w.length/1000,H=w.height/1000,Th=(w.thickness||120)/1000;
  const x1=w.start[0]/1000,z1=w.start[1]/1000,x2=w.end[0]/1000,z2=w.end[1]/1000;
  const cx=(x1+x2)/2,cz=(z1+z2)/2,ang=Math.atan2(z2-z1,x2-x1);
  const g=new T.Group();
  const body=new T.Mesh(new T.BoxGeometry(L,H,Th),M.wall);body.position.set(cx,H/2,cz);body.rotation.y=ang;body.castShadow=true;body.receiveShadow=true;g.add(body);
  const crown=new T.Mesh(new T.BoxGeometry(L,.06,Th+.04),M.skirting);crown.position.set(cx,H+.03,cz);crown.rotation.y=ang;crown.castShadow=true;g.add(crown);
  const base=new T.Mesh(new T.BoxGeometry(L,.1,Th+.025),M.skirting);base.position.set(cx,.05,cz);base.rotation.y=ang;base.receiveShadow=true;g.add(base);
  const stripe=new T.Mesh(new T.BoxGeometry(L,.018,Th+.01),tm);stripe.position.set(cx,H-.05,cz);stripe.rotation.y=ang;g.add(stripe);
  return g;
}
function buildFloor(room,mat){
  const f=room.floor,w=f.width/1000,d=f.depth/1000,ox=(f.offset_x||0)/1000,oz=(f.offset_z||0)/1000;
  const m=new T.Mesh(new T.PlaneGeometry(w,d),mat);m.rotation.x=-Math.PI/2;m.position.set(ox+w/2,.002,oz+d/2);m.receiveShadow=true;return m;
}
function buildCeiling(room){
  const f=room.floor,w=f.width/1000,d=f.depth/1000,ox=(f.offset_x||0)/1000,oz=(f.offset_z||0)/1000;
  const wh=room.walls||[],H=(wh.length>0?wh[0].height:2800)/1000;
  const g=new T.Group();
  const ceil=new T.Mesh(new T.PlaneGeometry(w,d),M.ceiling);ceil.rotation.x=-Math.PI/2;ceil.position.set(ox+w/2,H,oz+d/2);g.add(ceil);
  const edge=new T.Mesh(new T.BoxGeometry(w+.01,.015,d+.01),M.ceilingEdge);edge.position.set(ox+w/2,H,oz+d/2);g.add(edge);
  return g;
}
function buildCabinet(c){
  const W=c.width/1000,H=c.height/1000,D=c.depth/1000,px=(c.position[0]||0)/1000,pz=(c.position[1]||0)/1000;
  const g=new T.Group(),cx=px+W/2,cy=H/2,cz=pz+D/2;
  const body=new T.Mesh(new T.BoxGeometry(W,H,D),M.cabinet);body.position.set(cx,cy,cz);body.castShadow=true;body.receiveShadow=true;g.add(body);
  const rim=new T.Mesh(new T.BoxGeometry(W+.02,.02,D+.02),M.cabAccent);rim.position.set(cx,H+.01,cz);g.add(rim);
  if(H>.9){const kick=new T.Mesh(new T.BoxGeometry(W-.1,.08,D-.08),M.cabAccent);kick.position.set(cx,.04,cz);kick.receiveShadow=true;g.add(kick)}
  if(W>.3&&H>.4){
    const nDoors=Math.max(1,Math.round(W/.55)),doorW=W/nDoors;
    for(let i=0;i<nDoors;i++){
      const dx=cx-W/2+doorW*(i+.5);
      const panel=new T.Mesh(new T.BoxGeometry(doorW-.04,H-.08,.006),M.cabAccent);panel.position.set(dx,cy,cz+D/2+.006);g.add(panel);
      if(H>.5){const hG=new T.CylinderGeometry(.007,.007,.05,8);hG.rotateX(Math.PI/2);const h=new T.Mesh(hG,M.handle);h.position.set(dx+doorW*.3,cy,cz+D/2+.035);g.add(h)}
    }
  }
  if(H>.7){const nS=Math.max(1,Math.round(H/.55));for(let s=1;s<nS;s++){const sh=new T.Mesh(new T.BoxGeometry(W-.02,.004,D-.02),M.cabAccent);sh.position.set(cx,H*s/nS,cz);g.add(sh)}}
  // Countertop for base cabinets
  if(H<1.1&&H>.5){const ct=new T.Mesh(new T.BoxGeometry(W+.03,.025,D+.03),M.counter);ct.position.set(cx,H+.02,cz);ct.castShadow=true;g.add(ct)}
  return g;
}

// ── Room Selector ──
function buildSidebar(rooms){
  const sb=document.getElementById('sidebar');sb.innerHTML='';
  // "All" button
  const allBtn=document.createElement('button');allBtn.className='all active';allBtn.innerHTML='<span class="dot" style="background:#fff"></span>全部显示';allBtn.onclick=()=>selRoom(-1);sb.appendChild(allBtn);
  rooms.forEach((r,i)=>{
    const btn=document.createElement('button');btn.innerHTML=`<span class="dot" style="background:#${flColors[i%flColors.length].toString(16).padStart(6,'0')}"></span>${r.name}`;
    btn.onclick=()=>selRoom(i);sb.appendChild(btn);
  });
  sb.classList.add('visible');
}
window.selRoom=function(idx){
  activeRoom=idx;
  document.querySelectorAll('#sidebar button').forEach((b,i)=>b.classList.toggle('active',i-1===idx||(idx===-1&&i===0)));
  if(idx===-1){
    roomGroups.forEach(rg=>rg.visible=true);
    const box=new T.Box3().setFromObject(MG);if(!box.isEmpty()){const ctr=box.getCenter(new T.Vector3());const maxD=Math.max(...box.getSize(new T.Vector3()).toArray());animateCamera(ctr,maxD)}
    document.getElementById('roomDetail').classList.remove('visible');
  }else{
    roomGroups.forEach((rg,i)=>{rg.visible=i===idx});
    const box=new T.Box3().setFromObject(roomGroups[idx]);if(!box.isEmpty()){const ctr=box.getCenter(new T.Vector3());const maxD=Math.max(...box.getSize(new T.Vector3()).toArray());animateCamera(ctr,maxD)}
    showDetail(idx);
  }
};
let camAnim=null;
function animateCamera(target,maxD){
  const sx=C.position.x,sy=C.position.y,sz=C.position.z,stx=O.target.x,sty=O.target.y,stz=O.target.z;
  const ex=target.x+maxD*.7,ey=target.y+maxD*.55,ez=target.z+maxD*.9,etx=target.x,ety=target.y,etz=target.z;
  if(camAnim)cancelAnimationFrame(camAnim);
  const start=performance.now();const dur=800;
  function step(now){
    const t=Math.min(1,(now-start)/dur),ease=t<.5?2*t*t:-1+(4-2*t)*t;
    C.position.set(sx+(ex-sx)*ease,sy+(ey-sy)*ease,sz+(ez-sz)*ease);
    O.target.set(stx+(etx-stx)*ease,sty+(ety-sty)*ease,stz+(etz-stz)*ease);O.update();
    if(t<1)camAnim=requestAnimationFrame(step);
  }
  camAnim=requestAnimationFrame(step);
}
function showDetail(idx){
  const r=roomGroups[idx],room=r.userData.roomData;
  const cabs=room.cabinets||[],walls=room.walls||[];
  let html=`<h3>${room.name}</h3>`;
  html+=`<div>尺寸: <b>${room.floor.width}</b> x <b>${room.floor.depth}</b> mm</div>`;
  html+=`<div>墙体: <b>${walls.length}</b> 面</div>`;
  html+=`<div>柜体: <b>${cabs.length}</b> 个</div>`;
  if(cabs.length>0){html+='<div style="margin-top:6px;font-size:10px">';cabs.forEach(c=>{html+=`<div>&bull; ${c.type}: ${c.width}x${c.height}x${c.depth}mm</div>`});html+='</div>'}
  const el=document.getElementById('roomDetail');el.innerHTML=html;el.classList.add('visible');
}

// ── Model Builder ──
function buildModel(data){
  while(MG.children.length>0)MG.remove(MG.children[0]);roomGroups=[];ci=0;activeRoom=-1;
  const rooms=data.rooms||[];let tw=0,tc=0;
  for(const room of rooms){
    const f=room.floor,fw=f.width/1000,fd=f.depth/1000,fox=(f.offset_x||0)/1000,foz=(f.offset_z||0)/1000;
    const fm=M.floor(flColors[ci%flColors.length]);
    const tm=new T.MeshStandardMaterial({color:flColors[ci%flColors.length],roughness:.18,metalness:.06,emissive:new T.Color(flColors[ci%flColors.length]).multiplyScalar(.12)});
    const rg=new T.Group();rg.name=room.name;rg.userData={roomData:room};
    rg.add(buildFloor(room,fm));
    rg.add(buildCeiling(room));
    for(const w of room.walls||[]){rg.add(buildWall(w,tm));tw++;}
    for(const c of room.cabinets||[]){rg.add(buildCabinet(c));tc++;}
    rg.add(makeLabel(room.name,fox+fw/2,2.2,foz+fd/2));
    MG.add(rg);roomGroups.push(rg);ci++;
  }
  buildSidebar(rooms);
  const box=new T.Box3().setFromObject(MG);if(!box.isEmpty()){const ctr=box.getCenter(new T.Vector3());const maxD=Math.max(...box.getSize(new T.Vector3()).toArray());O.target.copy(ctr);C.position.set(ctr.x+maxD*.7,ctr.y+maxD*.55,ctr.z+maxD*.9);O.update()}
  document.getElementById('sp').textContent=data.project||'—';document.getElementById('sr').textContent=rooms.length;document.getElementById('sw').textContent=tw;document.getElementById('sc').textContent=tc;
  document.getElementById('overlay').classList.add('hidden');document.getElementById('topbar').classList.add('visible');document.getElementById('bottombar').classList.add('visible');document.getElementById('help').classList.add('visible');document.getElementById('toast').classList.remove('show');
}

// ── Health / API ──
(async function(){try{const r=await fetch('/api/health');const d=await r.json();d.vision_available?document.getElementById('backendInfo').textContent=d.backend+' ('+d.model+')':document.getElementById('btnVision').style.opacity='.4'}catch(e){}})();
let parseMode='text';
window.setMode=function(m){parseMode=m;document.getElementById('btnText').classList.toggle('active',m==='text');document.getElementById('btnVision').classList.toggle('active',m==='vision')};

async function parsePDF(file){
  document.getElementById('toast').classList.add('show');document.getElementById('toast').querySelector('.msg').textContent=parseMode==='vision'?'AI 视觉增强中...':'解析中...';
  const fd=new FormData();fd.append('file',file);
  try{const resp=await fetch('/api/parse?mode='+parseMode,{method:'POST',body:fd});const data=await resp.json();
    if(data.error){alert('解析失败: '+data.error);document.getElementById('toast').classList.remove('show');return}
    setTimeout(()=>buildModel(data),300);
  }catch(err){alert('请求失败: '+err.message);document.getElementById('toast').classList.remove('show')}
}

// ── File ──
const dropZone=document.getElementById('dropZone'),fileInput=document.getElementById('fileInput');
dropZone.addEventListener('click',()=>fileInput.click());fileInput.addEventListener('change',e=>{if(e.target.files[0])parsePDF(e.target.files[0])});
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag')});dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('drag');if(e.dataTransfer.files[0])parsePDF(e.dataTransfer.files[0])});

// ── Controls ──
window.V=function(v){document.querySelectorAll('#view-controls button').forEach(b=>b.classList.remove('active'));document.querySelector(`[data-view="${v}"]`)?.classList.add('active');const t=O.target.clone(),d=C.position.distanceTo(t);if(v==='top')C.position.copy(t).add(new T.Vector3(.01,d,0));else if(v==='front')C.position.copy(t).add(new T.Vector3(0,.5,d));else if(v==='right')C.position.copy(t).add(new T.Vector3(d,.5,0));else C.position.set(t.x+d*.55,t.y+d*.4,t.z+d*.75);O.update()};
let wr=false;
window.W=function(){wr=!wr;document.getElementById('btn-wire').classList.toggle('active',wr);MG.traverse(c=>{if(c.isMesh){const ms=Array.isArray(c.material)?c.material:[c.material];ms.forEach(m=>{if(m!==gnd.material&&m.wireframe!==undefined)m.wireframe=wr})}})};
window.U=function(){document.getElementById('overlay').classList.remove('hidden');document.getElementById('topbar').classList.remove('visible');document.getElementById('bottombar').classList.remove('visible');document.getElementById('help').classList.remove('visible');document.getElementById('sidebar').classList.remove('visible');document.getElementById('roomDetail').classList.remove('visible');while(MG.children.length>0)MG.remove(MG.children[0]);roomGroups=[]};
window.addEventListener('keydown',e=>{
  if(e.key==='1')V('persp');if(e.key==='2')V('top');if(e.key==='3')V('front');if(e.key==='4')V('right');if(e.key==='w'||e.key==='W')W();
  if(e.key==='ArrowLeft'||e.key==='ArrowRight'){const n=roomGroups.length;if(!n)return;let next=activeRoom+(e.key==='ArrowRight'?1:-1);if(next>=n)next=-1;if(next<-1)next=n-1;selRoom(next)}
});
window.addEventListener('resize',()=>{C.aspect=innerWidth/innerHeight;C.updateProjectionMatrix();R.setSize(innerWidth,innerHeight)});
(function l(){requestAnimationFrame(l);O.update();R.render(S,C)})();
</script></body></html>
