<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>观澜北苑 — 3D 空间漫游</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0f14;--surface:#18181f;--border:rgba(255,255,255,.06);--text:#e8e6e1;--text-dim:rgba(255,255,255,.35);--accent:#c8a87c;--accent-dim:rgba(200,168,124,.15);--radius:10px;--font:'Outfit',system-ui,sans-serif;--mono:'DM Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:var(--bg);font-family:var(--font);color:var(--text)}
canvas{display:block;position:fixed;top:0;left:0}

/* Crosshair */
#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:20px;height:20px;z-index:40;pointer-events:none;display:none}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,.6)}
#crosshair::before{width:2px;height:20px;left:9px;top:0}
#crosshair::after{width:20px;height:2px;left:0;top:9px}
#crosshair.show{display:block}

/* Overlay */
#overlay{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,rgba(15,15,20,.7),rgba(10,10,16,.95));backdrop-filter:blur(20px);transition:opacity .6s,visibility .6s}
#overlay.hidden{opacity:0;visibility:hidden;pointer-events:none}
#overlay .bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.015) 1px,transparent 1px);background-size:40px 40px;mask-image:radial-gradient(ellipse at center,black 30%,transparent 70%)}
#overlay .cnt{position:relative;z-index:1;text-align:center;max-width:480px;padding:0 24px}
#overlay .brand{font-family:Georgia,serif;font-style:italic;font-size:15px;color:var(--accent);letter-spacing:.08em;margin-bottom:20px}
#overlay h1{font-size:36px;font-weight:300;letter-spacing:.02em;line-height:1.2;margin-bottom:12px}
#overlay h1 span{font-weight:700;color:var(--accent)}
#overlay .desc{font-size:15px;color:var(--text-dim);line-height:1.6;margin-bottom:36px}
#dropZone{display:block;padding:44px 32px;border:1px dashed rgba(255,255,255,.12);border-radius:16px;cursor:pointer;transition:all .35s}
#dropZone:hover{border-color:var(--accent);border-style:solid;background:var(--accent-dim)}
#dropZone .icon{font-size:36px;margin-bottom:12px;transition:transform .35s}
#dropZone:hover .icon{transform:translateY(-4px)}
#dropZone .label{font-size:15px;font-weight:500}
#dropZone .hint{font-size:12px;color:var(--text-dim);font-family:var(--mono)}
#dropZone.drag{border-color:var(--accent);border-style:solid;background:var(--accent-dim)}
#overlay .ftr{display:flex;gap:24px;justify-content:center;margin-top:28px;font-size:11px;color:var(--text-dim);font-family:var(--mono);letter-spacing:.04em}
.mode-btn{padding:7px 18px;border:1px solid rgba(255,255,255,.12);background:transparent;color:var(--text-dim);border-radius:20px;cursor:pointer;font-size:12px;font-weight:500;transition:all .25s;margin:0 4px}
.mode-btn:hover{border-color:rgba(255,255,255,.2);color:var(--text)}
.mode-btn.active{border-color:var(--accent);color:var(--accent);background:var(--accent-dim)}
#toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:200;pointer-events:none;opacity:0;transition:opacity .3s}
#toast.show{opacity:1}
#toast .pulse{width:48px;height:48px;border-radius:50%;background:var(--accent);margin:0 auto 16px;animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(.8);opacity:.6}50%{transform:scale(1.1);opacity:1}}
#toast .msg{text-align:center;font-size:13px;color:var(--text-dim);font-family:var(--mono)}

/* Sidebar */
#sidebar{position:fixed;left:16px;top:50%;transform:translateY(-50%);z-index:50;display:flex;flex-direction:column;gap:4px;opacity:0;transition:opacity .5s}
#sidebar.visible{opacity:1}
#sidebar button{width:110px;padding:9px 12px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);border-radius:8px;cursor:pointer;font-size:11px;font-family:var(--font);font-weight:500;text-align:left;transition:all .25s;backdrop-filter:blur(10px)}
#sidebar button:hover{color:var(--text);border-color:rgba(255,255,255,.15)}
#sidebar button.sel{color:var(--accent);border-color:var(--accent);background:var(--accent-dim)}
#sidebar button .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:6px;vertical-align:middle}
#sidebar button.all{font-weight:600}

/* Top bar */
#topbar{position:fixed;top:16px;left:150px;right:16px;z-index:50;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;opacity:0;transition:opacity .5s}
#topbar.visible{opacity:1}
#topbar>*{pointer-events:auto}
#vc{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px;backdrop-filter:blur(20px)}
#vc button{padding:6px 14px;border:none;background:transparent;color:var(--text-dim);border-radius:7px;cursor:pointer;font-size:12px;font-weight:500;transition:all .2s}
#vc button:hover{color:var(--text)}
#vc button.on{color:var(--accent);background:var(--accent-dim)}
#info-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:10px 16px;backdrop-filter:blur(20px);font-size:12px}
#info-card .pj{font-weight:600}
#info-card .meta{display:flex;gap:12px;margin-top:2px;font-size:10px;color:var(--text-dim);font-family:var(--mono)}
#info-card .meta b{color:var(--accent);font-weight:500}

/* Bottom */
#bottombar{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:50;display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:4px;backdrop-filter:blur(20px);opacity:0;transition:opacity .5s}
#bottombar.visible{opacity:1}
#bottombar button{padding:7px 14px;border:none;background:transparent;color:var(--text-dim);border-radius:7px;cursor:pointer;font-size:11px;font-weight:500;transition:all .2s}
#bottombar button:hover{color:var(--text)}
#bottombar button.on{color:var(--accent)}
#bottombar .sep{width:1px;background:var(--border);margin:3px 5px}

/* Walk hint */
#walkhint{position:fixed;top:80px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.5);font-size:12px;z-index:45;display:none;background:rgba(0,0,0,.6);padding:6px 14px;border-radius:20px;font-family:var(--mono)}
#walkhint.show{display:block}

#fileInput{display:none}
</style>
</head>
<body>

<!-- Upload -->
<div id="overlay"><div class="bg-grid"></div><div class="cnt">
<div class="brand">Architectural Walkthrough</div><h1>设计图 <span>&rarr;</span> 空间漫游</h1>
<p class="desc">上传室内设计 PDF 图纸，即时生成可交互 3D 空间</p>
<div id="dropZone"><div class="icon">&#128208;</div><div class="label">拖放 PDF 文件到此处</div><div class="hint">或点击选择 &middot; 最大 50MB</div></div>
<div style="margin-top:24px"><button id="btnText" class="mode-btn active" onclick="setMode('text')">文本解析</button><button id="btnVision" class="mode-btn" onclick="setMode('vision')">AI 视觉</button></div>
<p id="backendInfo" style="margin-top:12px;font-size:11px;color:var(--text-dim);font-family:var(--mono)"></p>
<div class="ftr"><span>全屋定制</span><span>尺寸提取</span><span>实时渲染</span></div>
</div></div>

<!-- Toast -->
<div id="toast"><div class="pulse"></div><div class="msg">解析中...</div></div>

<!-- Crosshair -->
<div id="crosshair"></div>

<!-- Walk hint -->
<div id="walkhint" onclick="if(walkMode&&!F.isLocked){F.lock();document.getElementById('walkhint').textContent='WASD 移动 · 鼠标环视 · ESC 退出'}">点击屏幕激活漫游 &middot; WASD 移动 &middot; ESC 退出</div>

<!-- Sidebar -->
<div id="sidebar"></div>

<!-- Top -->
<div id="topbar">
<div id="vc"><button class="on" data-view="persp" onclick="V('persp')">鸟瞰</button><button data-view="walk" onclick="V('walk')">🚶 漫游</button><button data-view="top" onclick="V('top')">俯视</button></div>
<div id="info-card"><div class="pj" id="sp">&mdash;</div><div class="meta"><span>房间 <b id="sr">0</b></span><span>墙体 <b id="sw">0</b></span><span>柜体 <b id="sc">0</b></span></div></div>
</div>

<!-- Bottom -->
<div id="bottombar"><button onclick="W()" id="btn-wire">线框</button><span class="sep"></span><button onclick="toggleCeil()" id="btn-ceil">天花板</button><span class="sep"></span><button onclick="selRoom(-1)">全部</button><span class="sep"></span><button onclick="U()">重新上传</button></div>
<input type="file" id="fileInput" accept=".pdf">

<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as T from "three";
import {OrbitControls} from "three/addons/controls/OrbitControls.js";
import {PointerLockControls} from "three/addons/controls/PointerLockControls.js";

// ── Textures ──
function makeTex(w,h,fn){const c=document.createElement('canvas');c.width=w;c.height=h;fn(c.getContext('2d'),w,h);const t=new T.CanvasTexture(c);t.wrapS=t.wrapT=T.RepeatWrapping;t.colorSpace=T.SRGBColorSpace;return t}
const texWall=makeTex(256,256,(x,w,h)=>{x.fillStyle='#f2efe8';x.fillRect(0,0,w,h);for(let i=0;i<350;i++){const g=238+Math.random()*10;x.fillStyle=`rgb(${g},${g},${g})`;x.fillRect(Math.random()*w,Math.random()*h,1+Math.random()*2,1+Math.random()*2)}});texWall.repeat.set(3,2);
const texFloor=makeTex(512,128,(x,w,h)=>{x.fillStyle='#ccb498';x.fillRect(0,0,w,h);for(let i=0;i<w;i+=28+Math.random()*14){x.fillStyle='#b89878';x.fillRect(i,0,2+Math.random(),h);x.fillStyle='#d8c8b0';x.fillRect(i+3,h*.3+Math.random()*h*.4,.5,10+Math.random()*18)}for(let i=0;i<180;i++){const g=155+Math.random()*25;x.fillStyle=`rgb(${g},${Math.floor(g*.7)},${Math.floor(g*.45)})`;x.fillRect(Math.random()*w,Math.random()*h,1,1)}});texFloor.repeat.set(2,4);
const texCab=makeTex(256,256,(x,w,h)=>{x.fillStyle='#f5f0e8';x.fillRect(0,0,w,h);for(let i=0;i<w;i+=8){x.fillStyle='#ede6d8';x.fillRect(i,0,.5,h)}});texCab.repeat.set(2,2);

// ── Materials ──
const flColors=[0xc8a87c,0x7b9cc2,0x8aaa7a,0xc4956a,0x9b8ec4,0x6aaa9a,0xc47a5a,0x7a8ea0];
const M={
  wall:new T.MeshStandardMaterial({map:texWall,color:0xf7f2e8,roughness:.82,metalness:.02}),
  floor:(c)=>new T.MeshStandardMaterial({map:texFloor,color:new T.Color(c).multiplyScalar(1.3),roughness:.35,metalness:.04}),
  cabinet:new T.MeshStandardMaterial({map:texCab,color:0xffffff,roughness:.23,metalness:.05}),
  cabAccent:new T.MeshStandardMaterial({color:0xe8e0d4,roughness:.3,metalness:.06}),
  handle:new T.MeshStandardMaterial({color:0xd4c8b0,roughness:.12,metalness:.55}),
  counter:new T.MeshStandardMaterial({color:0xe8e0d4,roughness:.15,metalness:.08}),
  skirting:new T.MeshStandardMaterial({color:0xf2eee6,roughness:.68,metalness:.02}),
  ceiling:new T.MeshStandardMaterial({color:0xfaf8f2,roughness:.9,metalness:0,side:T.DoubleSide}),
  door:new T.MeshStandardMaterial({color:0xd4c0a0,roughness:.28,metalness:.06}),
  doorFrame:new T.MeshStandardMaterial({color:0xe8e0d0,roughness:.5,metalness:.04}),
};

// ── Scene ──
const S=new T.Scene();S.background=new T.Color(0x0f0f14);S.fog=new T.Fog(0x0f0f14,15,50);
const C=new T.PerspectiveCamera(60,innerWidth/innerHeight,.1,50);
const R=new T.WebGLRenderer({antialias:true});R.setSize(innerWidth,innerHeight);R.setPixelRatio(Math.min(devicePixelRatio,2));R.shadowMap.enabled=true;R.shadowMap.type=T.PCFSoftShadowMap;R.toneMapping=T.ACESFilmicToneMapping;R.toneMappingExposure=1.15;
document.body.appendChild(R.domElement);

// Orbit controls
const O=new OrbitControls(C,R.domElement);O.enableDamping=true;O.dampingFactor=.08;O.minDistance=.5;O.maxDistance=40;O.maxPolarAngle=Math.PI*.52;O.target.set(0,1.5,0);O.update();

// First-person controls
const F=new PointerLockControls(C,R.domElement);
let walkMode=false,walkSpeed=2.5;
const keys={};let playerHeight=1.65;
let walkPrompted=false;

// ── Lighting ──
S.add(new T.AmbientLight(0x445566,1.8));
const sun=new T.DirectionalLight(0xfff8ee,5);sun.position.set(10,15,-5);sun.castShadow=true;sun.shadow.mapSize.set(2048,2048);sun.shadow.camera.near=.5;sun.shadow.camera.far=60;sun.shadow.camera.left=-15;sun.shadow.camera.right=15;sun.shadow.camera.top=15;sun.shadow.camera.bottom=-8;sun.shadow.bias=-.0002;sun.shadow.normalBias=.02;S.add(sun);
S.add(new T.DirectionalLight(0xaabbdd,2)).position.set(-5,5,6);
S.add(new T.DirectionalLight(0xffffff,1)).position.set(0,3,-8);

// ── Ground ──
const gnd=new T.Mesh(new T.PlaneGeometry(50,50),new T.MeshStandardMaterial({color:0x181820,roughness:.95}));gnd.rotation.x=-Math.PI/2;gnd.position.y=-.01;gnd.receiveShadow=true;S.add(gnd);
const grid=new T.GridHelper(50,100,0x333355,0x22223a);grid.position.y=.002;grid.material.transparent=true;grid.material.opacity=.35;grid.material.depthWrite=false;S.add(grid);

// ── Model ──
const MG=new T.Group();S.add(MG);
let roomGroups=[],ceilGroups=[],activeRoom=-1,showCeil=true,ci=0;
let wallColliders=[]; // for walk collision

// ── Builders ──
function splitWallByDoors(w,doors){
  // Split wall at door positions to create gaps
  if(!doors||doors.length===0)return[{start:w.start,end:w.end,length:w.length,height:w.height,thickness:w.thickness,id:w.id}];
  const L=w.length,sx=w.start[0],sy=w.start[1],ex=w.end[0],ey=w.end[1];
  const dx=ex-sx,dy=ey-sy;
  // Sort doors by position along wall
  const sorted=doors.map(d=>({pos:d.position||0,width:d.width||900})).sort((a,b)=>a.pos-b.pos);
  const segments=[];let cursor=0;
  for(const d of sorted){
    if(d.pos>cursor+50){segments.push({start:[sx+dx*cursor/L,sy+dy*cursor/L],end:[sx+dx*(d.pos)/L,sy+dy*(d.pos)/L],length:d.pos-cursor,height:w.height,thickness:w.thickness,id:w.id+'_seg'+segments.length})}
    cursor=d.pos+d.width;
  }
  if(cursor<L-50){segments.push({start:[sx+dx*cursor/L,sy+dy*cursor/L],end:ex,ey,length:L-cursor,height:w.height,thickness:w.thickness,id:w.id+'_seg'+segments.length})}
  return segments.length>0?segments:[w];
}

function buildWall(w,tm){
  const L=w.length/1000,H=w.height/1000,Th=(w.thickness||120)/1000;
  const x1=w.start[0]/1000,z1=w.start[1]/1000,x2=w.end[0]/1000,z2=w.end[1]/1000;
  const cx=(x1+x2)/2,cz=(z1+z2)/2,ang=Math.atan2(z2-z1,x2-x1);
  const g=new T.Group();
  // Wall body
  const body=new T.Mesh(new T.BoxGeometry(L,H,Th),M.wall);body.position.set(cx,H/2,cz);body.rotation.y=ang;body.castShadow=true;body.receiveShadow=true;g.add(body);
  // Store for collision
  body.userData={isWall:true,cx,cz,L,H,Th,ang};
  wallColliders.push(body);
  // Skirting
  const base=new T.Mesh(new T.BoxGeometry(L,.1,Th+.02),M.skirting);base.position.set(cx,.05,cz);base.rotation.y=ang;base.receiveShadow=true;g.add(base);
  // Crown
  const crown=new T.Mesh(new T.BoxGeometry(L,.06,Th+.04),M.skirting);crown.position.set(cx,H+.03,cz);crown.rotation.y=ang;crown.castShadow=true;g.add(crown);
  // Room stripe
  const stripe=new T.Mesh(new T.BoxGeometry(L,.018,Th+.01),tm);stripe.position.set(cx,H-.05,cz);stripe.rotation.y=ang;g.add(stripe);
  return g;
}
function buildFloor(room,mat){
  const f=room.floor,w=f.width/1000,d=f.depth/1000,ox=(f.offset_x||0)/1000,oz=(f.offset_z||0)/1000;
  const m=new T.Mesh(new T.PlaneGeometry(w,d),mat);m.rotation.x=-Math.PI/2;m.position.set(ox+w/2,.002,oz+d/2);m.receiveShadow=true;return m;
}
function buildCeiling(room){
  const f=room.floor,w=f.width/1000,d=f.depth/1000,ox=(f.offset_x||0)/1000,oz=(f.offset_z||0)/1000;
  const H=((room.walls||[])[0]||{height:2800}).height/1000;
  const g=new T.Group();g.name='ceiling';
  const ceil=new T.Mesh(new T.PlaneGeometry(w,d),M.ceiling);ceil.rotation.x=-Math.PI/2;ceil.position.set(ox+w/2,H,oz+d/2);g.add(ceil);
  return g;
}
function buildDoor(d,wallData){
  const W=d.width/1000,Hh=(d.height||2100)/1000;
  const wx=(wallData.start[0]+wallData.end[0])/2000,wz=(wallData.start[1]+wallData.end[1])/2000;
  const dx=(wallData.end[0]-wallData.start[0])/1000,dz=(wallData.end[1]-wallData.start[1])/1000;
  const ang=Math.atan2(dz,dx),pos=(d.position||0)/1000;
  const g=new T.Group();
  const ax=wx+Math.cos(ang)*pos,az=wz+Math.sin(ang)*pos;
  // Door body
  const body=new T.Mesh(new T.BoxGeometry(W,Hh,.05),M.door);body.position.set(ax,Hh/2,az);body.rotation.y=ang;body.castShadow=true;g.add(body);
  // Frame
  const fw=.04;
  const frameL=new T.Mesh(new T.BoxGeometry(fw,Hh+fw,fw),M.doorFrame);frameL.position.set(ax-W/2,0,az);frameL.rotation.y=ang;g.add(frameL);
  const frameR=new T.Mesh(new T.BoxGeometry(fw,Hh+fw,fw),M.doorFrame);frameR.position.set(ax+W/2,0,az);frameR.rotation.y=ang;g.add(frameR);
  const frameT=new T.Mesh(new T.BoxGeometry(W+fw*2,fw,fw),M.doorFrame);frameT.position.set(ax,Hh+.02,az);frameT.rotation.y=ang;g.add(frameT);
  // Handle
  const hG=new T.CylinderGeometry(.008,.008,.04,8);hG.rotateX(Math.PI/2);
  const h=new T.Mesh(hG,M.handle);h.position.set(ax+W*.35,Hh*.5,az+.04);g.add(h);
  return g;
}
function buildCabinet(c){
  const W=c.width/1000,H=c.height/1000,D=c.depth/1000,px=(c.position[0]||0)/1000,pz=(c.position[1]||0)/1000;
  const g=new T.Group(),cx=px+W/2,cy=H/2,cz=pz+D/2;
  const body=new T.Mesh(new T.BoxGeometry(W,H,D),M.cabinet);body.position.set(cx,cy,cz);body.castShadow=true;body.receiveShadow=true;g.add(body);
  const rim=new T.Mesh(new T.BoxGeometry(W+.02,.02,D+.02),M.cabAccent);rim.position.set(cx,H+.01,cz);g.add(rim);
  if(H>.9){const kick=new T.Mesh(new T.BoxGeometry(W-.1,.08,D-.08),M.cabAccent);kick.position.set(cx,.04,cz);kick.receiveShadow=true;g.add(kick)}
  if(W>.3&&H>.4){
    const nDoors=Math.max(1,Math.round(W/.55)),doorW=W/nDoors;
    for(let i=0;i<nDoors;i++){
      const dx=cx-W/2+doorW*(i+.5);
      const panel=new T.Mesh(new T.BoxGeometry(doorW-.04,H-.08,.006),M.cabAccent);panel.position.set(dx,cy,cz+D/2+.006);g.add(panel);
      if(H>.5){const hG=new T.CylinderGeometry(.007,.007,.05,8);hG.rotateX(Math.PI/2);const h=new T.Mesh(hG,M.handle);h.position.set(dx+doorW*.3,cy,cz+D/2+.035);g.add(h)}
    }
  }
  if(H>.7){const nS=Math.max(1,Math.round(H/.55));for(let s=1;s<nS;s++){const sh=new T.Mesh(new T.BoxGeometry(W-.02,.004,D-.02),M.cabAccent);sh.position.set(cx,H*s/nS,cz);g.add(sh)}}
  if(H<1.1&&H>.5){const ct=new T.Mesh(new T.BoxGeometry(W+.03,.025,D+.03),M.counter);ct.position.set(cx,H+.02,cz);ct.castShadow=true;g.add(ct)}
  return g;
}

// ── Sidebar ──
function buildSidebar(rooms){
  const sb=document.getElementById('sidebar');sb.innerHTML='';
  const allBtn=document.createElement('button');allBtn.className='all sel';allBtn.innerHTML='<span class="dot" style="background:#fff"></span>全部显示';allBtn.onclick=()=>selRoom(-1);sb.appendChild(allBtn);
  rooms.forEach((r,i)=>{
    const btn=document.createElement('button');btn.innerHTML=`<span class="dot" style="background:#${flColors[i%flColors.length].toString(16).padStart(6,'0')}"></span>${r.name}`;
    btn.onclick=()=>selRoom(i);sb.appendChild(btn);
  });
  sb.classList.add('visible');
}
window.selRoom=function(idx){
  activeRoom=idx;
  document.querySelectorAll('#sidebar button').forEach((b,i)=>b.classList.toggle('sel',i===0&&idx===-1||i-1===idx));
  if(idx===-1){roomGroups.forEach(rg=>rg.visible=true);fitCamToAll()}
  else{roomGroups.forEach((rg,i)=>{rg.visible=i===idx});fitCamToGroup(roomGroups[idx])}
};
function fitCamToAll(){const box=new T.Box3().setFromObject(MG);if(!box.isEmpty()){const ctr=box.getCenter(new T.Vector3());const maxD=Math.max(...box.getSize(new T.Vector3()).toArray());animCam(ctr.x,ctr.y,ctr.z,maxD)}}
function fitCamToGroup(rg){const box=new T.Box3().setFromObject(rg);if(!box.isEmpty()){const ctr=box.getCenter(new T.Vector3());const maxD=Math.max(...box.getSize(new T.Vector3()).toArray());animCam(ctr.x,ctr.y,ctr.z,maxD)}}
let camAnim=null;
function animCam(tx,ty,tz,maxD){
  if(walkMode)return;
  const sx=C.position.x,sy=C.position.y,sz=C.position.z,stx=O.target.x,sty=O.target.y,stz=O.target.z;
  const ex=tx+maxD*.7,ey=ty+maxD*.55,ez=tz+maxD*.9;
  if(camAnim)cancelAnimationFrame(camAnim);
  const start=performance.now();
  function step(now){const t=Math.min(1,(now-start)/700),ease=t<.5?2*t*t:-1+(4-2*t)*t;C.position.set(sx+(ex-sx)*ease,sy+(ey-sy)*ease,sz+(ez-sz)*ease);O.target.set(stx+(tx-stx)*ease,sty+(ty-sty)*ease,stz+(tz-stz)*ease);O.update();if(t<1)camAnim=requestAnimationFrame(step)}
  camAnim=requestAnimationFrame(step);
}

// ── Model Builder ──
function buildModel(data){
  while(MG.children.length>0)MG.remove(MG.children[0]);roomGroups=[];ceilGroups=[];wallColliders=[];ci=0;activeRoom=-1;
  const rooms=data.rooms||[];let tw=0,tc=0;
  for(const room of rooms){
    const f=room.floor,fw=f.width/1000,fd=f.depth/1000,fox=(f.offset_x||0)/1000,foz=(f.offset_z||0)/1000;
    const fm=M.floor(flColors[ci%flColors.length]);
    const tm=new T.MeshStandardMaterial({color:flColors[ci%flColors.length],roughness:.18,metalness:.06,emissive:new T.Color(flColors[ci%flColors.length]).multiplyScalar(.12)});
    const rg=new T.Group();rg.name=room.name;
    rg.add(buildFloor(room,fm));

    // Split walls at door openings for first-person walkthrough
    const openings=room.openings||[];
    let doorOpenings=openings.filter(o=>o.type==='door');
    for(const w of room.walls||[]){
      const doorsOnWall=doorOpenings.filter(d=>d.wall_id===w.id);
      if(doorsOnWall.length>0){
        const segments=splitWallByDoors(w,doorsOnWall);
        for(const seg of segments)rg.add(buildWall(seg,tm));
      }else{
        rg.add(buildWall(w,tm));
      }
      tw++;
      // Build door geometry
      for(const d of doorsOnWall)rg.add(buildDoor(d,w));
    }
    for(const c of room.cabinets||[]){rg.add(buildCabinet(c));tc++}

    // Ceiling
    const ceilG=buildCeiling(room);rg.add(ceilG);ceilGroups.push(ceilG);

    // Room label
    const cvs=document.createElement('canvas');cvs.width=256;cvs.height=64;
    const ctx=cvs.getContext('2d');ctx.fillStyle='rgba(255,255,255,.85)';ctx.font='600 26px Outfit,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(room.name,128,32);
    const sp=new T.Sprite(new T.SpriteMaterial({map:new T.CanvasTexture(cvs),transparent:true,depthTest:false,depthWrite:false}));
    sp.position.set(fox+fw/2,2.2,foz+fd/2);sp.scale.set(2.4,.6,1);rg.add(sp);

    MG.add(rg);roomGroups.push(rg);ci++;
  }
  buildSidebar(rooms);
  fitCamToAll();
  document.getElementById('sp').textContent=data.project||'—';document.getElementById('sr').textContent=rooms.length;document.getElementById('sw').textContent=tw;document.getElementById('sc').textContent=tc;
  document.getElementById('overlay').classList.add('hidden');document.getElementById('topbar').classList.add('visible');document.getElementById('bottombar').classList.add('visible');document.getElementById('toast').classList.remove('show');
}

// ── Walk Mode (First Person) ──
window.V=function(v){
  document.querySelectorAll('#vc button').forEach(b=>b.classList.remove('on'));
  if(v==='walk'){
    enterWalkMode();
    document.querySelector('[data-view="walk"]')?.classList.add('on');
  }else{
    exitWalkMode();
    document.querySelector(`[data-view="${v}"]`)?.classList.add('on');
    if(v==='top'){const t=O.target.clone(),d=C.position.distanceTo(t);C.position.copy(t).add(new T.Vector3(.01,d,0));O.update()}
    else if(v==='front'){const t=O.target.clone(),d=C.position.distanceTo(t);C.position.copy(t).add(new T.Vector3(0,.5,d));O.update()}
    else if(v==='right'){const t=O.target.clone(),d=C.position.distanceTo(t);C.position.copy(t).add(new T.Vector3(d,.5,0));O.update()}
    else if(v==='persp')fitCamToAll();
  }
};

function enterWalkMode(){
  walkMode=true;C.fov=65;C.updateProjectionMatrix();
  let targetRG=null;
  if(roomGroups.length>0&&activeRoom>=0&&activeRoom<roomGroups.length)targetRG=roomGroups[activeRoom];
  else if(roomGroups.length>0)targetRG=roomGroups[0];
  if(targetRG){
    const box=new T.Box3().setFromObject(targetRG);if(!box.isEmpty()){const c=box.getCenter(new T.Vector3());C.position.set(c.x,playerHeight,c.z)}
  }
  O.enabled=false;
  document.getElementById('crosshair').classList.add('show');
  document.getElementById('walkhint').classList.add('show');
  document.getElementById('walkhint').textContent='🖱 点击屏幕激活 · WASD 移动 · ESC 退出';
  if(showCeil){ceilGroups.forEach(cg=>cg.visible=false)}
  document.querySelectorAll('#sidebar button').forEach((b,i)=>{if(i===0)b.classList.add('sel');else b.classList.remove('sel')});
  activeRoom=-1;roomGroups.forEach(rg=>rg.visible=true);
}

function exitWalkMode(){
  walkMode=false;walkPrompted=false;
  F.unlock();
  O.enabled=true;C.fov=50;C.updateProjectionMatrix();
  document.getElementById('crosshair').classList.remove('show');
  document.getElementById('walkhint').classList.remove('show');
  if(showCeil){ceilGroups.forEach(cg=>cg.visible=true)}
}

// Click canvas to lock pointer when in walk mode
R.domElement.addEventListener('click',()=>{
  if(walkMode&&!F.isLocked){
    F.lock();
    document.getElementById('walkhint').textContent='WASD 移动 · 鼠标环视 · ESC 退出';
  }
});

F.addEventListener('lock',()=>{});
F.addEventListener('unlock',()=>{if(walkMode)exitWalkMode()});

// Walk movement
const walkDir=new T.Vector3();
const playerRadius=.25;
function checkWallCollision(pos){
  for(const w of wallColliders){
    if(!w.userData.isWall)continue;
    const wq=new T.Quaternion().setFromAxisAngle(new T.Vector3(0,1,0),w.userData.ang);
    const local=new T.Vector3().copy(pos).sub(new T.Vector3(w.userData.cx,0,w.userData.cz)).applyQuaternion(wq.clone().invert());
    const hw=w.userData.L/2,hh=w.userData.H,ht=w.userData.Th/2+playerRadius;
    if(Math.abs(local.x)<hw+playerRadius&&Math.abs(local.z)<ht&&pos.y<hh){
      // Push out of wall
      if(Math.abs(local.z)<ht){
        const pushDir=local.x>0?1:-1;
        pos.x+=pushDir*(hw+playerRadius-Math.abs(local.x))*Math.cos(w.userData.ang);
        pos.z+=pushDir*(hw+playerRadius-Math.abs(local.x))*Math.sin(w.userData.ang);
      }
      return true;
    }
  }
  return false;
}

function updateWalk(delta){
  if(!walkMode||!F.isLocked)return;
  const dt=Math.min(delta,.1);
  walkDir.set(0,0,0);
  if(keys['KeyW'])walkDir.z-=1;
  if(keys['KeyS'])walkDir.z+=1;
  if(keys['KeyA'])walkDir.x-=1;
  if(keys['KeyD'])walkDir.x+=1;
  if(walkDir.length()>.01){
    walkDir.normalize();
    // Apply camera rotation (ignore pitch for movement)
    const yaw=new T.Euler(0,C.rotation.y,0);
    walkDir.applyEuler(yaw);
    const mv=walkDir.multiplyScalar(walkSpeed*dt);
    // Try X movement
    const testX=C.position.clone();testX.x+=mv.x;checkWallCollision(testX);C.position.x=testX.x;
    // Try Z movement
    const testZ=C.position.clone();testZ.z+=mv.z;checkWallCollision(testZ);C.position.z=testZ.z;
    C.position.y=playerHeight;
  }
}

// ── Ceiling toggle ──
window.toggleCeil=function(){
  showCeil=!showCeil;document.getElementById('btn-ceil').classList.toggle('on',!showCeil);
  if(!walkMode){ceilGroups.forEach(cg=>cg.visible=showCeil)}
};

// ── Wireframe ──
let wr=false;
window.W=function(){wr=!wr;document.getElementById('btn-wire').classList.toggle('on',wr);MG.traverse(c=>{if(c.isMesh){const ms=Array.isArray(c.material)?c.material:[c.material];ms.forEach(m=>{if(m!==gnd.material&&m.wireframe!==undefined)m.wireframe=wr})}})};
window.U=function(){document.getElementById('overlay').classList.remove('hidden');document.getElementById('topbar').classList.remove('visible');document.getElementById('bottombar').classList.remove('visible');document.getElementById('sidebar').classList.remove('visible');exitWalkMode();while(MG.children.length>0)MG.remove(MG.children[0]);roomGroups=[];wallColliders=[];ceilGroups=[]};

// ── Keyboard ──
window.addEventListener('keydown',e=>{keys[e.code]=true;if(walkMode&&e.code==='Escape'){exitWalkMode();document.querySelector('[data-view="persp"]')?.classList.add('on')}});
window.addEventListener('keyup',e=>{keys[e.code]=false});
window.addEventListener('keydown',e=>{
  if(!walkMode){
    if(e.key==='1')V('persp');if(e.key==='2')V('walk');if(e.key==='3')V('top');
    if(e.key==='w'||e.key==='W')W();
    if(e.key==='ArrowLeft'||e.key==='ArrowRight'){const n=roomGroups.length;if(!n)return;let next=activeRoom+(e.key==='ArrowRight'?1:-1);if(next>=n)next=-1;if(next<-1)next=n-1;selRoom(next)}
  }
});
window.addEventListener('resize',()=>{C.aspect=innerWidth/innerHeight;C.updateProjectionMatrix();R.setSize(innerWidth,innerHeight)});

// ── API ──
(async function(){try{const r=await fetch('/api/health');const d=await r.json();d.vision_available?document.getElementById('backendInfo').textContent=d.backend+' ('+d.model+')':document.getElementById('btnVision').style.opacity='.4'}catch(e){}})();
let parseMode='text';
window.setMode=function(m){parseMode=m;document.getElementById('btnText').classList.toggle('active',m==='text');document.getElementById('btnVision').classList.toggle('active',m==='vision')};
async function parsePDF(file){
  document.getElementById('toast').classList.add('show');
  const fd=new FormData();fd.append('file',file);
  try{const resp=await fetch('/api/parse?mode='+parseMode,{method:'POST',body:fd});const data=await resp.json();
    if(data.error){alert('解析失败: '+data.error);document.getElementById('toast').classList.remove('show');return}
    setTimeout(()=>buildModel(data),300);
  }catch(err){alert('请求失败: '+err.message);document.getElementById('toast').classList.remove('show')}
}
const dropZone=document.getElementById('dropZone'),fileInput=document.getElementById('fileInput');
dropZone.addEventListener('click',()=>fileInput.click());fileInput.addEventListener('change',e=>{if(e.target.files[0])parsePDF(e.target.files[0])});
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag')});dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('drag');if(e.dataTransfer.files[0])parsePDF(e.dataTransfer.files[0])});

// ── Render loop ──
const clock=new T.Clock();
(function l(){requestAnimationFrame(l);
  const delta=clock.getDelta();
  updateWalk(delta);
  if(walkMode)O.update();
  else O.update();
  R.render(S,C);
})();
</script></body></html>
