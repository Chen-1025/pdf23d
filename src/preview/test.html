<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>观澜北苑30-1101 - 3D</title>
<style>*{margin:0;padding:0}body{overflow:hidden;background:#1a1a2e;font:14px system-ui}
#bar{position:fixed;top:16px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10}
#bar button{padding:8px 16px;border:1px solid rgba(255,255,255,.25);background:rgba(0,0,0,.7);color:#fff;border-radius:8px;cursor:pointer;font-size:13px}
#bar button:hover,#bar button.sel{background:rgba(37,99,235,.6)}
#tip{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.5);font-size:11px;z-index:10;background:rgba(0,0,0,.5);padding:6px 16px;border-radius:20px;display:flex;gap:14px}
</style></head><body>
<div id="bar">
  <button class="sel" onclick="V('persp')" id="bp">透视图</button>
  <button onclick="V('top')" id="bt">俯视图</button>
  <button onclick="V('front')" id="bf">前视图</button>
  <button onclick="V('right')" id="br">右视图</button>
  <button onclick="T()" id="bw">线框</button>
</div>
<div id="tip"><span>左键旋转</span><span>滚轮缩放</span><span>右键平移</span><span>1-4视角</span><span>W线框</span></div>
<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as T from "three";
import {OrbitControls} from "three/addons/controls/OrbitControls.js";
const DATA = {"project": "观澜北苑30-1101", "rooms": [{"name": "厨房", "floor": {"width": 3000, "depth": 2500, "material": "floor_wood", "offset_x": -4100, "offset_z": -8650}, "walls": [{"id": "room_1_s", "length": 3000, "height": 2800, "thickness": 120, "start": [-4100, -8650], "end": [-1100, -8650]}, {"id": "room_1_e", "length": 2500, "height": 2800, "thickness": 120, "start": [-1100, -8650], "end": [-1100, -6150]}, {"id": "room_1_n", "length": 3000, "height": 2800, "thickness": 120, "start": [-1100, -6150], "end": [-4100, -6150]}, {"id": "room_1_w", "length": 2500, "height": 2800, "thickness": 120, "start": [-4100, -6150], "end": [-4100, -8650]}], "cabinets": [{"id": "room_1_cab_1", "type": "kitchen_cabinet", "width": 1285, "height": 830, "depth": 420, "position": [-3900, -8600], "material": "PET/40", "source_page": 1}, {"id": "room_1_cab_2", "type": "kitchen_cabinet", "width": 920, "height": 900, "depth": 400, "position": [-3900, -6600], "material": "PET/40", "source_page": 2}, {"id": "room_1_cab_3", "type": "kitchen_cabinet", "width": 1314, "height": 870, "depth": 420, "position": [-2585, -8600], "material": "PET/40", "source_page": 3}], "openings": []}, {"name": "客厅", "floor": {"width": 5000, "depth": 4200, "material": "floor_wood", "offset_x": -4100, "offset_z": -4650}, "walls": [{"id": "room_2_s", "length": 5000, "height": 2800, "thickness": 120, "start": [-4100, -4650], "end": [900, -4650]}, {"id": "room_2_e", "length": 4200, "height": 2800, "thickness": 120, "start": [900, -4650], "end": [900, -450]}, {"id": "room_2_n", "length": 5000, "height": 2800, "thickness": 120, "start": [900, -450], "end": [-4100, -450]}, {"id": "room_2_w", "length": 4200, "height": 2800, "thickness": 120, "start": [-4100, -450], "end": [-4100, -4650]}], "cabinets": [{"id": "room_2_cab_4", "type": "shelving", "width": 977, "height": 1200, "depth": 400, "position": [-3900, -4600], "material": "PET/9", "source_page": 4}, {"id": "room_2_cab_7", "type": "shelving", "width": 1600, "height": 1010, "depth": 600, "position": [-3900, -1100], "material": "PET/9", "source_page": 7}, {"id": "room_2_cab_9", "type": "shelving", "width": 1687, "height": 1200, "depth": 300, "position": [-2893, -4600], "material": "PET/40", "source_page": 9}, {"id": "room_2_cab_10", "type": "tv_cabinet", "width": 2400, "height": 600, "depth": 590, "position": [-1700, -1100], "material": "PET/9", "source_page": 10}, {"id": "room_2_cab_12", "type": "shelving", "width": 1935, "height": 1200, "depth": 350, "position": [-1176, -4600], "material": "PET/40", "source_page": 12}], "openings": []}, {"name": "餐厅", "floor": {"width": 3500, "depth": 3000, "material": "floor_wood", "offset_x": -100, "offset_z": -8650}, "walls": [{"id": "room_3_s", "length": 3500, "height": 2800, "thickness": 120, "start": [-100, -8650], "end": [3400, -8650]}, {"id": "room_3_e", "length": 3000, "height": 2800, "thickness": 120, "start": [3400, -8650], "end": [3400, -5650]}, {"id": "room_3_n", "length": 3500, "height": 2800, "thickness": 120, "start": [3400, -5650], "end": [-100, -5650]}, {"id": "room_3_w", "length": 3000, "height": 2800, "thickness": 120, "start": [-100, -5650], "end": [-100, -8650]}], "cabinets": [{"id": "room_3_cab_5", "type": "sideboard", "width": 2560, "height": 1100, "depth": 550, "position": [370, -8600], "material": "PET/9", "source_page": 5}], "openings": []}, {"name": "卧室", "floor": {"width": 4200, "depth": 3600, "material": "floor_wood", "offset_x": -4100, "offset_z": 550}, "walls": [{"id": "room_4_s", "length": 4200, "height": 2800, "thickness": 120, "start": [-4100, 550], "end": [100, 550]}, {"id": "room_4_e", "length": 3600, "height": 2800, "thickness": 120, "start": [100, 550], "end": [100, 4150]}, {"id": "room_4_n", "length": 4200, "height": 2800, "thickness": 120, "start": [100, 4150], "end": [-4100, 4150]}, {"id": "room_4_w", "length": 3600, "height": 2800, "thickness": 120, "start": [-4100, 4150], "end": [-4100, 550]}], "cabinets": [{"id": "room_4_cab_6", "type": "wardrobe", "width": 2560, "height": 2560, "depth": 480, "position": [-3900, 600], "material": "PET/9", "source_page": 6}, {"id": "room_4_cab_13", "type": "bedroom_furniture", "width": 2560, "height": 2200, "depth": 610, "position": [-3900, 3490], "material": "PET/40", "source_page": 13}], "openings": []}, {"name": "书房", "floor": {"width": 3000, "depth": 2800, "material": "floor_wood", "offset_x": 1100, "offset_z": 550}, "walls": [{"id": "room_5_s", "length": 3000, "height": 2800, "thickness": 120, "start": [1100, 550], "end": [4100, 550]}, {"id": "room_5_e", "length": 2800, "height": 2800, "thickness": 120, "start": [4100, 550], "end": [4100, 3350]}, {"id": "room_5_n", "length": 3000, "height": 2800, "thickness": 120, "start": [4100, 3350], "end": [1100, 3350]}, {"id": "room_5_w", "length": 2800, "height": 2800, "thickness": 120, "start": [1100, 3350], "end": [1100, 550]}], "cabinets": [{"id": "room_5_cab_8", "type": "study_furniture", "width": 2590, "height": 2200, "depth": 480, "position": [1305, 600], "material": "PET/9", "source_page": 8}], "openings": []}, {"name": "房间", "floor": {"width": 4000, "depth": 3500, "material": "floor_wood", "offset_x": -4100, "offset_z": 5150}, "walls": [{"id": "room_6_s", "length": 4000, "height": 2800, "thickness": 120, "start": [-4100, 5150], "end": [-100, 5150]}, {"id": "room_6_e", "length": 3500, "height": 2800, "thickness": 120, "start": [-100, 5150], "end": [-100, 8650]}, {"id": "room_6_n", "length": 4000, "height": 2800, "thickness": 120, "start": [-100, 8650], "end": [-4100, 8650]}, {"id": "room_6_w", "length": 3500, "height": 2800, "thickness": 120, "start": [-4100, 8650], "end": [-4100, 5150]}], "cabinets": [{"id": "room_6_cab_11", "type": "cabinet", "width": 1450, "height": 1420, "depth": 600, "position": [-2825, 5200], "material": "PET/9", "source_page": 11}], "openings": []}]};

const S=new T.Scene();S.background=new T.Color(0x1c1c30);S.fog=new T.Fog(0x1c1c30,20,60);
const C=new T.PerspectiveCamera(55,innerWidth/innerHeight,.1,80);C.position.set(8,7,10);
const R=new T.WebGLRenderer({antialias:true});R.setSize(innerWidth,innerHeight);R.setPixelRatio(Math.min(devicePixelRatio,2));R.shadowMap.enabled=true;R.shadowMap.type=T.PCFSoftShadowMap;R.toneMapping=T.ACESFilmicToneMapping;R.toneMappingExposure=1.1;
document.body.appendChild(R.domElement);
const O=new OrbitControls(C,R.domElement);O.enableDamping=true;O.dampingFactor=.1;O.minDistance=1;O.maxDistance=40;O.maxPolarAngle=Math.PI*.52;O.update();

S.add(new T.AmbientLight(0x8899bb,2));
const sun=new T.DirectionalLight(0xffffff,5);sun.position.set(10,15,-5);sun.castShadow=true;sun.shadow.mapSize.set(2048,2048);sun.shadow.camera.left=-20;sun.shadow.camera.right=20;sun.shadow.camera.top=20;sun.shadow.camera.bottom=-8;S.add(sun);
S.add(new T.DirectionalLight(0xaaccff,2)).position.set(-3,3,5);

S.add(new T.GridHelper(25,50,0x555577,0x333350));
const gnd=new T.Mesh(new T.PlaneGeometry(30,30),new T.MeshStandardMaterial({color:0x2a2a3a}));gnd.rotation.x=-Math.PI/2;gnd.position.y=-.01;gnd.receiveShadow=true;S.add(gnd);

const flColors=[0xc0392b,0x2980b9,0x27ae60,0xf39c12,0x8e44ad,0x16a085];
const wMat=new T.MeshStandardMaterial({color:0xeeeeee,roughness:.8});
const cMat=new T.MeshStandardMaterial({color:0xf2efe8,roughness:.2});
const MG=new T.Group();S.add(MG);
let ci=0;

function bWall(w,tm){
  const L=w.length/1000,H=w.height/1000,Th=(w.thickness||120)/1000;
  const x1=w.start[0]/1000,z1=w.start[1]/1000,x2=w.end[0]/1000,z2=w.end[1]/1000;
  const cx=(x1+x2)/2,cz=(z1+z2)/2,ang=Math.atan2(z2-z1,x2-x1);
  const g=new T.Group();
  const b=new T.Mesh(new T.BoxGeometry(L,H,Th),wMat);b.position.set(cx,H/2,cz);b.rotation.y=ang;b.castShadow=true;b.receiveShadow=true;g.add(b);
  const tp=new T.Mesh(new T.BoxGeometry(L,.03,Th+.02),tm);tp.position.set(cx,H+.01,cz);tp.rotation.y=ang;g.add(tp);
  const sk=new T.Mesh(new T.BoxGeometry(L,.08,Th+.006),tm);sk.position.set(cx,.04,cz);sk.rotation.y=ang;sk.receiveShadow=true;g.add(sk);
  return g;
}
function bFloor(room,mat){
  const f=room.floor,w=f.width/1000,d=f.depth/1000,ox=(f.offset_x||0)/1000,oz=(f.offset_z||0)/1000;
  const m=new T.Mesh(new T.PlaneGeometry(w,d),mat);m.rotation.x=-Math.PI/2;m.position.set(ox+w/2,.005,oz+d/2);m.receiveShadow=true;
  return m;
}
function bCab(c){
  const W=c.width/1000,H=c.height/1000,D=c.depth/1000,px=(c.position[0]||0)/1000,pz=(c.position[1]||0)/1000;
  const b=new T.Mesh(new T.BoxGeometry(W,H,D),cMat);b.position.set(px+W/2,H/2,pz+D/2);b.castShadow=true;b.receiveShadow=true;
  return b;
}

function bLabel(text,x,y,z){
  const cvs=document.createElement('canvas');cvs.width=256;cvs.height=64;
  const ctx=cvs.getContext('2d');ctx.fillStyle='#fff';ctx.font='bold 28px sans-serif';ctx.textAlign='center';ctx.fillText(text,128,38);
  const tex=new T.CanvasTexture(cvs);tex.minFilter=T.LinearFilter;
  const mat=new T.SpriteMaterial({map:tex,transparent:true,depthTest:false,depthWrite:false});
  const sp=new T.Sprite(mat);sp.position.set(x,y,z);sp.scale.set(3,0.75,1);
  return sp;
}

for(const room of DATA.rooms){
  const f=room.floor,fw=f.width/1000,fd=f.depth/1000,fox=(f.offset_x||0)/1000,foz=(f.offset_z||0)/1000;
  const fm=new T.MeshStandardMaterial({color:flColors[ci%flColors.length],roughness:.4});
  const tm=new T.MeshStandardMaterial({color:flColors[ci%flColors.length],roughness:.2});
  const rg=new T.Group();rg.name=room.name;
  rg.add(bFloor(room,fm));
  for(const w of room.walls)rg.add(bWall(w,tm));
  for(const c of room.cabinets||[])rg.add(bCab(c));
  // Room label at center, 2m above floor
  rg.add(bLabel(room.name, fox+fw/2, 2.0, foz+fd/2));
  MG.add(rg);ci++;
}

const box=new T.Box3().setFromObject(MG);if(!box.isEmpty()){const ctr=box.getCenter(new T.Vector3());const sz=box.getSize(new T.Vector3());const maxD=Math.max(sz.x,sz.y,sz.z);O.target.copy(ctr);C.position.set(ctr.x+maxD*.7,ctr.y+maxD*.55,ctr.z+maxD*.9);O.update();}

window.V=function(v){
  document.querySelectorAll("#bar button").forEach(b=>b.classList.remove("sel"));
  document.getElementById("b"+v[0])?.classList.add("sel");
  const t=O.target.clone(),d=C.position.distanceTo(t);
  if(v==="top")C.position.copy(t).add(new T.Vector3(.01,d,0));
  else if(v==="front")C.position.copy(t).add(new T.Vector3(0,.5,d));
  else if(v==="right")C.position.copy(t).add(new T.Vector3(d,.5,0));
  else C.position.set(t.x+d*.55,t.y+d*.4,t.z+d*.75);
  O.update();
};
let wr=false;
window.T=function(){wr=!wr;document.getElementById("bw").classList.toggle("sel",wr);MG.traverse(c=>{if(c.isMesh){const ms=Array.isArray(c.material)?c.material:[c.material];ms.forEach(m=>{if(m!==gnd.material)m.wireframe=wr})}});};

window.addEventListener("keydown",e=>{if(e.key==="1")V("persp");if(e.key==="2")V("top");if(e.key==="3")V("front");if(e.key==="4")V("right");if(e.key==="w"||e.key==="W")T();});
window.addEventListener("resize",()=>{C.aspect=innerWidth/innerHeight;C.updateProjectionMatrix();R.setSize(innerWidth,innerHeight)});
(function l(){requestAnimationFrame(l);O.update();R.render(S,C)})();
</script></body></html>
